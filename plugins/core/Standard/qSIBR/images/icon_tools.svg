<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f8ff"/>
      <stop offset="100%" stop-color="#e0e8f5"/>
    </linearGradient>
    <linearGradient id="gear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>
  <!-- gear: circle + 8 teeth as rects -->
  <g transform="translate(16,16)">
    <circle r="7.5" fill="url(#gear)" stroke="#334155" stroke-width="0.45"/>
    <circle r="3.8" fill="#e2e8f0" stroke="#64748b" stroke-width="0.35"/>
    <!-- 8 teeth at 0,45,... -->
    <rect x="-1.4" y="-11.2" width="2.8" height="4" rx="0.5" fill="url(#gear)" stroke="#334155" stroke-width="0.3" transform="rotate(0)"/>
    <rect x="-1.4" y="-11.2" width="2.8" height="4" rx="0.5" fill="url(#gear)" stroke="#334155" stroke-width="0.3" transform="rotate(45)"/>
    <rect x="-1.4" y="-11.2" width="2.8" height="4" rx="0.5" fill="url(#gear)" stroke="#334155" stroke-width="0.3" transform="rotate(90)"/>
    <rect x="-1.4" y="-11.2" width="2.8" height="4" rx="0.5" fill="url(#gear)" stroke="#334155" stroke-width="0.3" transform="rotate(135)"/>
    <rect x="-1.4" y="-11.2" width="2.8" height="4" rx="0.5" fill="url(#gear)" stroke="#334155" stroke-width="0.3" transform="rotate(180)"/>
    <rect x="-1.4" y="-11.2" width="2.8" height="4" rx="0.5" fill="url(#gear)" stroke="#334155" stroke-width="0.3" transform="rotate(225)"/>
    <rect x="-1.4" y="-11.2" width="2.8" height="4" rx="0.5" fill="url(#gear)" stroke="#334155" stroke-width="0.3" transform="rotate(270)"/>
    <rect x="-1.4" y="-11.2" width="2.8" height="4" rx="0.5" fill="url(#gear)" stroke="#334155" stroke-width="0.3" transform="rotate(315)"/>
  </g>
  <!-- D badge -->
  <rect x="19" y="4" width="9" height="8" rx="1.8" fill="#22c55e" stroke="#16a34a" stroke-width="0.35"/>
  <text x="23.5" y="10" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="6.5" font-weight="700" fill="#ffffff">D</text>
</svg>
