<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f5"/>
      <stop offset="1" stop-color="#ebe6df"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>
  <!-- Golden center splat (anisotropic ellipsoid) -->
  <ellipse cx="17" cy="17" rx="12" ry="7" fill="#f59e0b" opacity=".1" transform="rotate(-15 17 17)"/>
  <ellipse cx="17" cy="17" rx="9"  ry="5" fill="#f59e0b" opacity=".18" transform="rotate(-15 17 17)"/>
  <ellipse cx="17" cy="17" rx="5.5" ry="3" fill="#fbbf24" opacity=".32" transform="rotate(-15 17 17)"/>
  <ellipse cx="17" cy="17" rx="2.5" ry="1.5" fill="#fcd34d" opacity=".7" transform="rotate(-15 17 17)"/>
  <!-- Blue splat -->
  <ellipse cx="9"  cy="11" rx="7.5" ry="4" fill="#3b82f6" opacity=".1" transform="rotate(30 9 11)"/>
  <ellipse cx="9"  cy="11" rx="5"   ry="2.8" fill="#3b82f6" opacity=".2" transform="rotate(30 9 11)"/>
  <ellipse cx="9"  cy="11" rx="3"   ry="1.5" fill="#60a5fa" opacity=".4" transform="rotate(30 9 11)"/>
  <ellipse cx="9"  cy="11" rx="1.5" ry=".8" fill="#93bbfd" opacity=".7" transform="rotate(30 9 11)"/>
  <!-- Pink splat -->
  <ellipse cx="24" cy="10" rx="6" ry="3.5" fill="#ec4899" opacity=".1" transform="rotate(-25 24 10)"/>
  <ellipse cx="24" cy="10" rx="4" ry="2.2" fill="#ec4899" opacity=".18" transform="rotate(-25 24 10)"/>
  <ellipse cx="24" cy="10" rx="2" ry="1.2" fill="#f472b6" opacity=".4" transform="rotate(-25 24 10)"/>
  <!-- Green splat -->
  <ellipse cx="10" cy="24" rx="6" ry="3" fill="#22c55e" opacity=".1" transform="rotate(20 10 24)"/>
  <ellipse cx="10" cy="24" rx="4" ry="2" fill="#22c55e" opacity=".18" transform="rotate(20 10 24)"/>
  <ellipse cx="10" cy="24" rx="2" ry="1" fill="#4ade80" opacity=".38" transform="rotate(20 10 24)"/>
  <!-- Purple splat -->
  <ellipse cx="24" cy="23" rx="6" ry="3.5" fill="#a855f7" opacity=".1" transform="rotate(-35 24 23)"/>
  <ellipse cx="24" cy="23" rx="4" ry="2" fill="#a855f7" opacity=".18" transform="rotate(-35 24 23)"/>
  <ellipse cx="24" cy="23" rx="2" ry="1" fill="#c084fc" opacity=".38" transform="rotate(-35 24 23)"/>
  <!-- 3D badge -->
  <rect x="2" y="2" width="13" height="8" rx="2.5" fill="#1d4ed8"/>
  <text x="8.5" y="8.5" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="6.5" font-weight="bold" fill="#fff">3D</text>
</svg>
