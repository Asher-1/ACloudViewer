<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Crosshair circle (calibration target) -->
  <circle cx="32" cy="32" r="22" stroke="#2196F3" stroke-width="2.5" fill="none"/>
  <circle cx="32" cy="32" r="14" stroke="#2196F3" stroke-width="1.5" fill="none"/>
  <circle cx="32" cy="32" r="6" stroke="#2196F3" stroke-width="1.5" fill="none"/>
  <circle cx="32" cy="32" r="2" fill="#F44336"/>
  <!-- Crosshair lines -->
  <line x1="32" y1="6" x2="32" y2="18" stroke="#2196F3" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="58" stroke="#2196F3" stroke-width="2" stroke-linecap="round"/>
  <line x1="6" y1="32" x2="18" y2="32" stroke="#2196F3" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="58" y2="32" stroke="#2196F3" stroke-width="2" stroke-linecap="round"/>
  <!-- Rotation arrows (extrinsic adjustment) -->
  <path d="M50 14 C56 20, 56 28, 52 34" stroke="#FF9800" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="54,13 50,14 51,18" fill="#FF9800"/>
  <path d="M14 50 C8 44, 8 36, 12 30" stroke="#FF9800" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="10,51 14,50 13,46" fill="#FF9800"/>
  <!-- Sensor icon (camera lens) -->
  <rect x="4" y="4" width="14" height="10" rx="2" fill="#4CAF50" opacity="0.8"/>
  <circle cx="11" cy="9" r="3" fill="white" opacity="0.9"/>
</svg>
