<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="lgBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="lgPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="lgScene" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94a3b8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#64748b" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="lgGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App icon tile -->
  <rect width="64" height="64" rx="10" fill="url(#lgBg)"/>
  <rect x="1" y="1" width="62" height="62" rx="9" fill="none" stroke="#475569" stroke-width="1" opacity="0.6"/>

  <!-- Image 0 (wide view) -->
  <rect x="5" y="11" width="25" height="34" rx="2.5" fill="url(#lgPanel)" stroke="#64748b" stroke-width="0.8"/>
  <rect x="7" y="28" width="21" height="15" rx="1" fill="url(#lgScene)"/>
  <path d="M7 28 L14 20 L20 24 L28 16 L28 28 Z" fill="#cbd5e1" opacity="0.35"/>
  <rect x="13" y="17" width="5" height="11" rx="0.5" fill="#e2e8f0" opacity="0.45"/>

  <!-- Image 1 (cropped / zoomed view) -->
  <rect x="34" y="11" width="25" height="34" rx="2.5" fill="url(#lgPanel)" stroke="#64748b" stroke-width="0.8"/>
  <rect x="36" y="24" width="21" height="19" rx="1" fill="url(#lgScene)"/>
  <path d="M36 38 L42 30 L48 34 L57 26 L57 38 Z" fill="#cbd5e1" opacity="0.35"/>
  <rect x="44" y="22" width="7" height="16" rx="0.5" fill="#e2e8f0" opacity="0.55"/>

  <!-- LightGlue match lines (iconic green) -->
  <g stroke="#22c55e" stroke-width="1.6" stroke-linecap="round" fill="none" filter="url(#lgGlow)">
    <line x1="18" y1="24" x2="46" y2="30"/>
    <line x1="14" y1="32" x2="42" y2="36"/>
    <line x1="22" y1="20" x2="50" y2="26"/>
    <line x1="16" y1="36" x2="48" y2="40"/>
  </g>

  <!-- Keypoints -->
  <g fill="#4ade80" filter="url(#lgGlow)">
    <circle cx="18" cy="24" r="2.2"/>
    <circle cx="14" cy="32" r="2"/>
    <circle cx="22" cy="20" r="1.8"/>
    <circle cx="16" cy="36" r="1.8"/>
    <circle cx="46" cy="30" r="2.2"/>
    <circle cx="42" cy="36" r="2"/>
    <circle cx="50" cy="26" r="1.8"/>
    <circle cx="48" cy="40" r="1.8"/>
  </g>

  <!-- Center gap divider -->
  <line x1="32" y1="11" x2="32" y2="45" stroke="#1e293b" stroke-width="2" opacity="0.85"/>

  <!-- Label -->
  <text x="32" y="58" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="8" font-weight="bold" letter-spacing="0.5">LG</text>
</svg>
