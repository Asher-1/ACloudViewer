name: MacOS
permissions: {}

on:
  workflow_dispatch:
    inputs:
      developer_build:
        description: 'Set to OFF for Release builds.'
        required: false
        default: 'ON'

  push:
    branches:
      - main

  release:
    types: [released]

  pull_request:
    types: [opened, reopened, synchronize]  # Rebuild on new pushes to PR

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners#supported-runners-and-hardware-resources
  NPROC: 4
  DEVELOPER_BUILD: ${{ github.event.inputs.developer_build || 'ON' }}
  BUILD_CUDA_MODULE: OFF

jobs:
  MacOS:
    permissions:
      contents: write  # upload
      actions: write   # release
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14]
        python_version: ['3.12']
    env:
      BUILD_SHARED_LIBS: OFF
      BUILD_TENSORFLOW_OPS: OFF
      BUILD_PYTORCH_OPS: OFF
      LOW_MEM_USAGE: ON
      CONDA_DEP_FILE_CLOUDVIEWER: ".ci/conda_macos_cloudViewer.yml"
    steps:
      - name: Setup DEVELOPER_BUILD
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            echo "DEVELOPER_BUILD=OFF" >> $GITHUB_ENV
          else
            echo "DEVELOPER_BUILD=${{ github.event.inputs.developer_build || 'ON' }}" >> $GITHUB_ENV
          fi
      - name: Set up Install path environment
        run: |
          echo "INSTALL_DIR=${HOME}/cloudViewer_install" >> $GITHUB_ENV
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Set up Vulkan SDK
        shell: bash
        run: util/install_vulkan_sdk_macos.sh
      - name: Setup cache
        uses: actions/cache@v4
        with:
          # Ref: https://github.com/apache/incubator-mxnet/pull/18459/files
          path: ~/.ccache
          # We include the commit sha in the cache key, as new cache entries are
          # only created if there is no existing entry for the key yet.
          key: ${{ runner.os }}-${{ runner.arch }}-ccache-${{ github.sha }}
          # Restore any ccache cache entry, if none for
          # ${{ runner.os }}-${{ runner.arch }}-ccache-${{ github.sha }} exists.
          # Common prefix will be used so that ccache can be used across commits.
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-ccache

      - name: Set up Python version
        run: |
          sed -i "" "s/3.8/${{ matrix.python_version }}/g" ${{ env.CONDA_DEP_FILE_CLOUDVIEWER }}

      # DGM: without caching, using conda on Windows takes a long time...
      - name: Set up Python environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: cloudViewer
          auto-activate-base: false
          environment-file: ${{ env.CONDA_DEP_FILE_CLOUDVIEWER }}
      
      - name: Install dependencies
        run: |
          brew install ccache pkg-config

          if [[ ${{ runner.arch }} == "ARM64"  ]]; then
            # Fix gfortran not found issue
            brew install gcc
            ln -s $(brew --prefix gcc)/bin/gfortran-* /usr/local/bin/gfortran
          fi

          curl -L "https://raw.githubusercontent.com/Asher-1/CloudViewerUpdate/main/tools/QtIFW-4.6.1-darwin.zip" -o ~/QtIFW-4.6.1-darwin.zip
          unzip -q ~/QtIFW-4.6.1-darwin.zip -d ~/
          rm ~/QtIFW-4.6.1-darwin.zip
          ls -hal ~/QtIFW-4.6.1-darwin/bin

          ccache -M 2G  # See .github/workflows/readme.md for ccache strategy.
      - name: Config and build APP
        shell: bash -l {0}
        run: |
          export PATH="${HOME}/QtIFW-4.6.1-darwin/bin:$PATH"
          export PATH="/usr/local/var/homebrew/linked/ccache/libexec:$PATH"
          export PKG_CONFIG_PATH="$CONDA_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH"
          export PATH="$CONDA_PREFIX/lib:$CONDA_PREFIX/lib/pkgconfig:$CONDA_PREFIX/lib/cmake:$PATH"
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "DEVELOPER_BUILD is ${{ env.DEVELOPER_BUILD }}"
          echo "INSTALL_DIR is ${{ env.INSTALL_DIR }}"

          ccache -s
          echo "Start to build GUI package On MacOS..."
          source util/ci_utils.sh
          build_gui_app with_conda package_installer with_vulkan
          ccache -s

          CLOUDVIEWER_VERSION_FULL="$(grep -F CLOUDVIEWER_VERSION_FULL build/CMakeCache.txt | cut -f2 -d'=')"
          DEVEL_PKG_NAME="$(basename ${{ env.INSTALL_DIR }}/ACloudViewer-${CLOUDVIEWER_VERSION_FULL}*.dmg)"
          echo "DEVEL_PKG_NAME=$DEVEL_PKG_NAME" >> $GITHUB_ENV

      - name: Upload ACloudViewer app to GitHub artifacts
        uses: actions/upload-artifact@v4
        if: ${{ env.BUILD_SHARED_LIBS == 'OFF' }}
        with:
          name: ACloudViewer-app-macosx-${{ runner.arch}}
          path: |
            ${{ env.INSTALL_DIR }}/${{ env.DEVEL_PKG_NAME }}
          if-no-files-found: error
        
      - name: Update devel release
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload main-devel ${{ env.INSTALL_DIR }}/${{ env.DEVEL_PKG_NAME }} --clobber
          gh release view main-devel

      - name: Public App Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          fail_on_unmatched_files: false
          generate_release_notes: false
          prerelease: false
          # body_path: ${{github.workspace}}/CHANGELOG.md
          files: |
            ${{ env.INSTALL_DIR }}/${{ env.DEVEL_PKG_NAME }}

  agent-integration:
    name: Agent Integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    needs: [MacOS]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14]

    steps:
      - name: Checkout ACloudViewer
        uses: actions/checkout@v4

      - name: Checkout CLI-Anything (agent harness)
        uses: actions/checkout@v4
        with:
          repository: Asher-1/CLI-Anything
          path: _cli-anything
          sparse-checkout: |
            acloudviewer/agent-harness

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download ACloudViewer installer
        uses: actions/download-artifact@v4
        with:
          name: ACloudViewer-app-macosx-${{ runner.arch }}
          path: /tmp/acv-installer/

      - name: Install ACloudViewer (Qt IFW silent install from DMG)
        env:
          QT_QPA_PLATFORM: minimal
        run: |
          DMG=$(find /tmp/acv-installer/ -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No .dmg installer found"
            exit 1
          fi
          hdiutil attach "$DMG" -nobrowse -noverify
          VOLUME=$(find /Volumes -maxdepth 1 -name "ACloudViewer*" | head -1)
          if [ -z "$VOLUME" ]; then
            echo "::error::DMG did not mount as expected"
            exit 1
          fi
          echo "=== DMG contents ==="
          ls -la "$VOLUME"/

          INSTALLER_APP=$(find "$VOLUME" -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$INSTALLER_APP" ]; then
            echo "::error::No installer .app found in DMG"
            hdiutil detach "$VOLUME"
            exit 1
          fi

          INSTALLER_BIN=$(find "$INSTALLER_APP/Contents/MacOS" -type f -perm +111 | head -1)
          echo "Installer binary: $INSTALLER_BIN"

          INSTALL_DIR="$HOME/ACloudViewer"
          "$INSTALLER_BIN" --root "$INSTALL_DIR" \
            --accept-licenses --accept-messages --confirm-command install
          hdiutil detach "$VOLUME"

          echo "=== Installed contents ==="
          ls -la "$INSTALL_DIR"/

          if [ -d "$INSTALL_DIR/ACloudViewer.app" ]; then
            echo "$INSTALL_DIR/ACloudViewer.app/Contents/MacOS" >> "$GITHUB_PATH"
            echo "ACV_BINARY=$INSTALL_DIR/ACloudViewer.app/Contents/MacOS/ACloudViewer" >> "$GITHUB_ENV"
          elif [ -f "$INSTALL_DIR/ACloudViewer" ]; then
            echo "$INSTALL_DIR" >> "$GITHUB_PATH"
            echo "ACV_BINARY=$INSTALL_DIR/ACloudViewer" >> "$GITHUB_ENV"
          else
            echo "::warning::Binary not found at expected paths, listing install dir recursively"
            find "$INSTALL_DIR" -name "ACloudViewer*" -type f 2>/dev/null || true
            echo "ACV_BINARY=" >> "$GITHUB_ENV"
          fi

      - name: Install agent harness
        run: |
          pip install -e "_cli-anything/acloudviewer/agent-harness[dev]"

      - name: Level 3 — Headless processing tests
        run: |
          python -m pytest agent-integration/tests/test_integration.py -v -k "level3"

  build-wheel:
    name: Build wheel
    permissions:
      contents: write  # upload
      actions: write   # release
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    strategy:
      fail-fast: false
      # https://github.community/t/how-to-conditionally-include-exclude-items-in-matrix-eg-based-on-branch/16853/6
      matrix:
        os: [macos-14]
        python_version: ['3.10', '3.11', '3.12']
        is_main:
          - ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
        exclude:
          - is_main: false
            python_version: '3.10'
          - is_main: false
            python_version: '3.11'

    env:
      CONDA_DEP_FILE: ".ci/conda_macos.yml"
      # PyTorch 2.7 only supports macOS-14 (Apple Silicon)
      BUILD_PYTORCH_OPS: ${{ matrix.os == 'macos-13' && 'OFF' || 'ON' }}
      # TensorFlow v2.19 only supports macOS-14 (Apple Silicon) and python 3.9-3.12
      BUILD_TENSORFLOW_OPS: OFF
      CLOUDVIEWER_ML_ROOT: ${{ github.workspace }}/CloudViewer-ML
    steps:
      - name: Setup DEVELOPER_BUILD
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            echo "DEVELOPER_BUILD=OFF" >> $GITHUB_ENV
          else
            echo "DEVELOPER_BUILD=${{ github.event.inputs.developer_build || 'ON' }}" >> $GITHUB_ENV
          fi

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Vulkan SDK
        shell: bash
        run: util/install_vulkan_sdk_macos.sh

      - name: Checkout CloudViewer-ML source code
        uses: actions/checkout@v4
        with:
          repository: Asher-1/CloudViewer-ML
          ref: main
          path: ${{ env.CLOUDVIEWER_ML_ROOT }}

      - name: Setup cache
        uses: actions/cache@v4
        with:
          # Ref: https://github.com/apache/incubator-mxnet/pull/18459/files
          path: ~/.ccache
          # We include the commit sha in the cache key, as new cache entries are
          # only created if there is no existing entry for the key yet.
          key: ${{ runner.os }}-${{ runner.arch }}-ccache-${{ github.sha }}
          # Restore any ccache cache entry, if none for
          # ${{ runner.os }}-${{ runner.arch }}-ccache-${{ github.sha }} exists.
          # Common prefix will be used so that ccache can be used across commits.
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-ccache

      - name: Set up Python version
        run: |
          sed -i "" "s/3.8/${{ matrix.python_version }}/g" ${{ env.CONDA_DEP_FILE }}

      - name: Set up Python environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: python${{ matrix.python_version }}
          auto-activate-base: false
          environment-file: ${{ env.CONDA_DEP_FILE }}

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          echo "Using python: $(which python)"
          python --version
          echo -n "Using pip: $(which pip)"
          python -m pip --version
          echo "Using cmake: $(which cmake)"
          cmake --version
          source util/ci_utils.sh
          install_python_dependencies
          
          # Fix macos-14 arm64 runner image issues, see comments in MacOS job.
          if [[ ${{ runner.arch}} == "ARM64"  ]]; then
            ln -s $(which gfortran-13) /usr/local/bin/gfortran
          fi

          brew install ccache
          ccache -M 2G  # See .github/workflows/readme.md for ccache strategy.

      - name: Config and build Wheel
        shell: bash -l {0}
        run: |
          export PATH="/usr/local/var/homebrew/linked/ccache/libexec:$PATH"
          export PKG_CONFIG_PATH="$CONDA_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH"
          export PATH="$CONDA_PREFIX/lib:$CONDA_PREFIX/lib/pkgconfig:$CONDA_PREFIX/lib/cmake:$PATH"
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "DEVELOPER_BUILD is ${{ env.DEVELOPER_BUILD }}"

          ccache -s
          echo "Start to build wheel package On MacOS..."
          source util/ci_utils.sh
          build_mac_wheel with_conda build_realsense with_vulkan
          ccache -s

          PIP_PKG_NAME="$(basename build/lib/python_package/pip_package/cloudviewer*.whl)"
          echo "PIP_PKG_NAME=$PIP_PKG_NAME" >> $GITHUB_ENV

      - name: Upload Wheel to GitHub artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PIP_PKG_NAME }}
          path: build/lib/python_package/pip_package/${{ env.PIP_PKG_NAME }}
          if-no-files-found: error
       
      - name: Update devel release
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload main-devel build/lib/python_package/pip_package/${{ env.PIP_PKG_NAME }} --clobber
          gh release view main-devel

      - name: Public Wheel Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          fail_on_unmatched_files: false
          generate_release_notes: false
          prerelease: false
          # body_path: ${{github.workspace}}/CHANGELOG.md
          files: |
            build/lib/python_package/pip_package/${{ env.PIP_PKG_NAME }}

  test-wheel:
    name: Test wheel
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    needs: [build-wheel]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14]
        python_version: ['3.10', '3.11', '3.12']
        is_main:
          - ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
        exclude:
          - is_main: false
            python_version: '3.10'
          - is_main: false
            python_version: '3.11'

    env:
      # PyTorch 2.7 only supports macOS-14 (Apple Silicon)
      BUILD_PYTORCH_OPS: ${{ matrix.os == 'macos-13' && 'OFF' || 'ON' }}
      # TensorFlow v2.19 only supports macOS-14 (Apple Silicon) and python 3.9-3.12
      BUILD_TENSORFLOW_OPS: OFF
      CLOUDVIEWER_ML_ROOT: ${{ github.workspace }}/CloudViewer-ML
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Checkout CloudViewer-ML source code
        uses: actions/checkout@v4
        with:
          repository: Asher-1/CloudViewer-ML
          ref: main
          path: ${{ env.CLOUDVIEWER_ML_ROOT }}

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: cloudviewer-*macosx*.whl
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
      
      - name: Test Python package
        run: |
          python -V
          source util/ci_utils.sh
          pi_tag=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          test_wheel cloudviewer*-"$pi_tag"-*_$(uname -m).whl
      # - name: Run Python unit tests
      #   run: |
      #     python -V
      #     source util/ci_utils.sh
      #     echo "Running CloudViewer python tests..."
      #     pi_tag=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
      #     run_python_tests cloudviewer*-"$pi_tag"-*_$(uname -m).whl
