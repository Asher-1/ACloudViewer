# CodeQL configuration: exclude vendored third-party libraries from analysis.
# For C/C++ manual builds, paths-ignore alone is insufficient -- the workflow
# also uses advanced-security/filter-sarif to post-filter SARIF results.

paths-ignore:
  - '3rdparty'
  - '3rdparty_downloads'
  - 'libs/Reconstruction/lib'
  - '**/extern'
  - '**/external'
  - '**/3rdparty'
  - '**/3rdparty_downloads'
  - '**/third_party'
  - '**/thirdparty'
  - 'plugins/core/Standard/qSIBR/3rdparty'
